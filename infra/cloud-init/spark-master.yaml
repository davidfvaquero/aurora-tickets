#cloud-config
package_update: true
write_files:
  - path: /tmp/bootstrap-master.sh
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      apt-get update -y
      apt-get install -y curl unzip
      cd /home/ubuntu
      curl -fsSL "__REPO_ARCHIVE_URL__" -o aurora_tickets.zip
      unzip -o aurora_tickets.zip -d aurora_src
      cd /home/ubuntu/aurora_src
      bash infra/scripts/install_spark_role.sh master
runcmd:
  - bash /tmp/bootstrap-master.sh
